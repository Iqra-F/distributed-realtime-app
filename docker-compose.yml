services:
  server:
    build: ./server
    expose:
      - "5000"
    volumes:
      - ./server:/app
      - ./shared:/shared
      - /app/node_modules
    depends_on:
      - redis

  client:
    build: ./client
    expose:
      - "3000"
    volumes:
      - ./client:/app
      - ./shared:/shared
      - /app/node_modules

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
      - client
      - auth-service

  auth-service:
    build: ./auth-service
    ports:
      - "4000:4000"
    volumes:
      - ./auth-service:/app
      - ./shared:/shared
      - /app/node_modules

    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata: