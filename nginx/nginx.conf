events {}

http {
  upstream backend {
    ip_hash;
    server server:5000;
  }

  server {
    listen 80;

    location /socket.io/ {
      proxy_pass http://backend;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;

      proxy_read_timeout 3600;
      proxy_send_timeout 3600;
    }

    location / {
      proxy_pass http://backend;
    }
  }
}